name: shekels
description: Loja virtual de shekels com apostas e compras
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # Banco de dados local
  sqflite: ^2.4.3
  path: ^1.9.0
  path_provider: ^2.1.5

  # Sessão local
  shared_preferences: ^2.5.5

  # Criptografia (hash de senha)
  crypto: ^3.0.7

  # HTTP (API externa)
  http: ^1.2.1

  # Notificações
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4

  # Compartilhamento
  share_plus: ^9.0.0

  # Câmera / Imagem
  image_picker: ^1.1.2

  # Gerenciamento de estado
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  # Sensores (bússola para Israel)
  sensors_plus: ^6.1.1

  # Áudio
  audioplayers: ^6.0.0

  # IA local (Rabi Mordechai)
  flutter_gemma: ^0.5.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
